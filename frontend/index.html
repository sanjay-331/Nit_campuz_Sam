<style>
  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif, "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol";
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }
  .bg-pattern {
    background-color: #f8fafc; /* bg-slate-50 */
    background-image: radial-gradient(circle at 1px 1px, #e5e7eb /* bg-gray-200 */ 1px, transparent 0);
    background-size: 24px 24px;
  }
  .responsive-columns {
      column-count: 1;
      column-gap: 1.5rem; /* 24px */
  }
  @media (min-width: 640px) {
      .responsive-columns {
          column-count: 2;
      }
  }
  @media (min-width: 1024px) {
      .responsive-columns {
          column-count: 3;
      }
  }

  @keyframes shimmer {
    100% {
      transform: translateX(100%);
    }
  }

  .shimmer-bg {
    position: relative;
    overflow: hidden;
  }

  .shimmer-bg::after {
    content: '';
    position: absolute;
    top: 0;
    right: 0;
    bottom: 0;
    left: 0;
    transform: translateX(-100%);
    background-image: linear-gradient(
      90deg,
      rgba(255, 255, 255, 0) 0,
      rgba(255, 255, 255, 0.2) 20%,
      rgba(255, 255, 255, 0.5) 60%,
      rgba(255, 255, 255, 0)
    );
    animation: shimmer 2s infinite;
  }
</style>
<style type="text/css" media="print">
  @page {
    size: A4;

  body {

    -webkit-filter: grayscale(100%);
    filter: grayscale(100%);
  }
  /* Hide all non-essential layout components */
  header, .md\:flex.md\:flex-shrink-0, .fixed.bottom-0, .fixed.bottom-6.right-6, .no-print {
    display: none !important;
  }
  /* Expand the main content area to full width */
  div[class*="md:ml-"] {
    margin-left: 0 !important;
  }
  main {
    padding: 0 !important;
  }
  /* Remove shadows and borders from printed cards for a cleaner look */
  .card-print {
    box-shadow: none !important;
    border: none !important;
  }
</style>
